name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Fix submodule URL (SSH → HTTPS for CI)
        run: |
          git config --file .gitmodules submodule.vendor/ffgl-rs.url https://github.com/wday/ffgl-rs.git
          git submodule sync
          git submodule update --init --recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows'
        run: choco install llvm -y

      - name: Build ISF plugins
        shell: bash
        run: |
          mkdir -p isf-out
          cd vendor/ffgl-rs
          python3 ../scripts/list-plugins.py --type isf --format build | tr -d '\r' | while IFS='|' read -r NAME SHADER DLL; do
            echo "==> Building ISF plugin: $NAME ($SHADER)"
            ISF_SOURCE="$(cd .. && pwd)/$SHADER" ISF_NAME="$NAME" cargo build --release -p ffgl-isf
            # Copy immediately — each ISF build overwrites the same output binary
            if [[ "$OSTYPE" == "darwin"* ]]; then
              cp target/release/libffgl_isf.dylib "../isf-out/$DLL"
            else
              cp target/release/ffgl_isf.dll "../isf-out/$DLL"
            fi
            echo "==> Saved: isf-out/$DLL"
          done

      - name: Build Rust plugins
        shell: bash
        run: |
          cd plugins
          python3 ../scripts/list-plugins.py --type rust --format build | tr -d '\r' | while IFS='|' read -r NAME CRATE DLL; do
            echo "==> Building Rust plugin: $NAME (crate: $CRATE)"
            cargo build --release -p "$CRATE"
          done

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          python3 scripts/list-plugins.py --format package --platform windows | tr -d '\r' | while IFS='|' read -r NAME BUNDLE DLL SRC; do
            if [ -f "$SRC" ]; then
              cp "$SRC" "dist/$DLL"
              echo "==> Packaged: dist/$DLL"
            else
              echo "==> WARNING: $SRC not found, skipping $DLL"
            fi
          done

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p dist
          python3 scripts/list-plugins.py --format package --platform macos | tr -d '\r' | while IFS='|' read -r NAME BUNDLE DLL SRC; do
            BUNDLE_DIR="dist/${BUNDLE}.bundle"
            mkdir -p "$BUNDLE_DIR/Contents/MacOS"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$BUNDLE_DIR/Contents/MacOS/$BUNDLE"
              echo "==> Packaged: $BUNDLE_DIR"
            else
              echo "==> WARNING: $SRC not found, skipping $BUNDLE"
            fi
          done
          cd dist && for d in *.bundle; do zip -r "${d%.bundle}-macos.zip" "$d"; done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-macos

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          FILES=()
          for f in release-windows/*.dll; do [ -f "$f" ] && FILES+=("$f"); done
          for f in release-macos/*-macos.zip; do [ -f "$f" ] && FILES+=("$f"); done

          gh release upload "$TAG" "${FILES[@]}" --clobber
