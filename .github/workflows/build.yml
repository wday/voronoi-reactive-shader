name: Build FFGL Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Fix submodule URL (SSH → HTTPS for CI)
        run: |
          git config --file .gitmodules submodule.vendor/ffgl-rs.url https://github.com/wday/ffgl-rs.git
          git submodule sync
          git submodule update --init --recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows'
        run: choco install llvm -y

      - name: Build ISF plugins
        shell: bash
        run: |
          mkdir -p isf-out
          cd vendor/ffgl-rs
          python3 ../scripts/list-plugins.py --type isf --format build | tr -d '\r' | while IFS='|' read -r NAME SHADER DLL; do
            echo "==> Building ISF plugin: $NAME ($SHADER)"
            ISF_SOURCE="$(cd .. && pwd)/$SHADER" ISF_NAME="$NAME" cargo build --release -p ffgl-isf
            # Copy immediately — each ISF build overwrites the same output binary
            if [[ "$OSTYPE" == "darwin"* ]]; then
              cp target/release/libffgl_isf.dylib "../isf-out/$DLL"
            else
              cp target/release/ffgl_isf.dll "../isf-out/$DLL"
            fi
            echo "==> Saved: isf-out/$DLL"
          done

      - name: Build Rust plugins
        shell: bash
        run: |
          cd plugins
          python3 ../scripts/list-plugins.py --type rust --format build | tr -d '\r' | while IFS='|' read -r NAME CRATE DLL; do
            echo "==> Building Rust plugin: $NAME (crate: $CRATE)"
            cargo build --release -p "$CRATE"
          done

      - name: Package artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p artifacts
          python3 scripts/list-plugins.py --format package --platform windows | tr -d '\r' | while IFS='|' read -r NAME BUNDLE DLL SRC; do
            if [ -f "$SRC" ]; then
              cp "$SRC" "artifacts/$DLL"
              echo "==> Packaged: artifacts/$DLL"
            else
              echo "==> WARNING: $SRC not found, skipping $DLL"
            fi
          done

      - name: Package artifacts (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p artifacts
          python3 scripts/list-plugins.py --format package --platform macos | tr -d '\r' | while IFS='|' read -r NAME BUNDLE DLL SRC; do
            BUNDLE_DIR="artifacts/${BUNDLE}.bundle"
            mkdir -p "$BUNDLE_DIR/Contents/MacOS"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$BUNDLE_DIR/Contents/MacOS/$BUNDLE"
              echo "==> Packaged: $BUNDLE_DIR"
            else
              echo "==> WARNING: $SRC not found, skipping $BUNDLE"
            fi
          done
          cd artifacts && for d in *.bundle; do zip -r "${d%.bundle}-macos.zip" "$d"; done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffgl-plugins-${{ matrix.platform }}
          path: artifacts/*
